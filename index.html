<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FatihSports | Canlı TV</title>
    
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <script src="https://cdn.dashjs.org/latest/dash.all.min.js"></script>
    
    <link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css" />
    <script src="https://cdn.plyr.io/3.7.8/plyr.polyfilled.js"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary-color: #e50914; 
            --bg-color: #121212;
            --panel-bg: #1e1e1e;
            --text-color: #ffffff;
            --spor-color: #28a745;   /* Spor Kategorisi Rengi (Yeşil) */
            --ulusal-color: #dc3545; /* Ulusal Kategorisi Rengi (Kırmızı) */
            
            --plyr-color-main: #e50914; 
            --plyr-video-background: #000000;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        header {
            background-color: var(--panel-bg);
            padding: 15px 30px;
            display: flex;
            align-items: center;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.5);
            z-index: 10;
        }

        header h1 {
            font-size: 24px;
            font-weight: 700;
            color: var(--text-color);
            letter-spacing: 1px;
        }

        header h1 span {
            color: var(--primary-color);
        }

        .main-container {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        .player-section {
            flex: 3;
            background-color: #000;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        #video-wrapper {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .plyr {
            width: 100%;
            height: 100%;
        }

        .now-playing {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.7);
            padding: 8px 15px;
            border-radius: 5px;
            font-size: 14px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 10px;
            pointer-events: none;
            z-index: 10;
        }

        .live-indicator {
            width: 10px;
            height: 10px;
            background-color: var(--primary-color);
            border-radius: 50%;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(229, 9, 20, 0.7); }
            70% { box-shadow: 0 0 0 10px rgba(229, 9, 20, 0); }
            100% { box-shadow: 0 0 0 0 rgba(229, 9, 20, 0); }
        }

        /* YENİLENDİ: Sidebar ve Kaydırma Sorunu Çözümü */
        .sidebar {
            flex: 1;
            background-color: var(--panel-bg);
            min-width: 300px;
            max-width: 400px;
            display: flex;
            flex-direction: column;
            border-left: 1px solid #333;
            overflow: hidden;
        }

        .sidebar-header {
            padding: 20px 20px 10px 20px;
            font-weight: 600;
            font-size: 18px;
            flex-shrink: 0;
        }

        /* YENİ: Kategori Butonları */
        .category-tabs {
            display: flex;
            padding: 0 20px 15px 20px;
            gap: 10px;
            border-bottom: 1px solid #333;
            flex-shrink: 0;
        }

        .tab-btn {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            background-color: #333;
            color: #fff;
            font-weight: 600;
            font-size: 14px;
            transition: all 0.3s ease;
        }

        .tab-btn:hover {
            opacity: 0.8;
        }

        /* Aktif Kategori Renkleri */
        .tab-btn.spor.active {
            background-color: var(--spor-color);
        }

        .tab-btn.ulusal.active {
            background-color: var(--ulusal-color);
        }

        /* KAYDIRMA ÇÖZÜMÜ: Alt kısma padding eklendi */
        .channel-list {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
            padding-bottom: 40px; /* En alttaki öğenin görünmesi için ekstra boşluk */
            min-height: 0;
        }

        .channel-list::-webkit-scrollbar { width: 8px; }
        .channel-list::-webkit-scrollbar-thumb {
            background-color: #444;
            border-radius: 4px;
        }

        .channel-btn {
            width: 100%;
            background-color: transparent;
            color: var(--text-color);
            border: none;
            padding: 15px;
            margin-bottom: 8px;
            text-align: left;
            font-size: 15px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .channel-btn:hover {
            background-color: #333;
            transform: translateX(5px);
        }

        .channel-btn.active {
            background-color: #444; /* Kategoriden bağımsız genel aktiflik rengi */
            font-weight: 600;
        }

        .channel-logo {
            width: 35px;
            height: 35px;
            object-fit: contain;
            border-radius: 4px;
            background-color: transparent;
        }

        .channel-icon {
            width: 35px;
            height: 35px;
            background-color: #555;
            border-radius: 5px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: bold;
            font-size: 12px;
            color: #fff;
        }

        @media (max-width: 900px) {
            .main-container { flex-direction: column; }
            .sidebar {
                max-width: 100%;
                flex: 1;
                border-left: none;
                border-top: 1px solid #333;
            }
            .player-section { flex: none; height: 40vh; }
        }
    </style>
</head>
<body>

    <header>
        <h1>Fatih<span>Sports</span></h1>
    </header>

    <div class="main-container">
        <div class="player-section">
            
            <div class="now-playing" id="now-playing-badge" style="display: none;">
                <div class="live-indicator"></div>
                <span id="current-channel-name">Kanal Seçilmedi</span>
            </div>

            <div id="video-wrapper"></div>
            
        </div>

        <div class="sidebar">
            <div class="sidebar-header">Kanal Listesi</div>
            
            <div class="category-tabs">
                <button class="tab-btn spor active" onclick="setCategory('Spor')">Spor</button>
                <button class="tab-btn ulusal" onclick="setCategory('Ulusal')">Ulusal</button>
            </div>

            <div class="channel-list" id="channel-list"></div>
        </div>
    </div>

    <script>
        // Kanallara "category" özelliği eklendi
        const channels = [
            {
                name: "FatihSports 1 HD",
                url: "https://noisy-cake-8ebc.travestigamzes.workers.dev/https://andro.0638527.xyz/checklist/androstreamlivebs1.m3u8",
                logo: "",
                category: "Spor"
            },
            {
                name: "FatihSports 1 HD (Yedek)",
                url: "https://noisy-cake-8ebc.travestigamzes.workers.dev/https://corestream.ronaldovurdu.help//hls/bein-sports-1.m3u8",
                logo: "",
                category: "Spor"
            },
            {
                name: "FatihSports 1 HD (Yedek 2)",
                url: "https://noisy-cake-8ebc.travestigamzes.workers.dev/http://andro.0638527.xyz/checklist/androstreamlivebs1.m3u8",
                logo: "",
                category: "Spor"
            },
            {
                name: "FatihSports 2 HD",
                url: "https://noisy-cake-8ebc.travestigamzes.workers.dev/https://corestream.ronaldovurdu.help//hls/bein-sports-2.m3u8",
                logo: "",
                category: "Spor"
            },
            {
                name: "FatihSports 3 HD",
                url: "https://noisy-cake-8ebc.travestigamzes.workers.dev/https://corestream.ronaldovurdu.help//hls/bein-sports-3.m3u8",
                logo: "",
                category: "Spor"
            },
            {
                name: "FatihSports 4 HD",
                url: "https://noisy-cake-8ebc.travestigamzes.workers.dev/https://corestream.ronaldovurdu.help//hls/bein-sports-4.m3u8",
                logo: "",
                category: "Spor"
            },
            // Ulusal Kategorisi İçin Örnek Kanal
            {
                name: "TRT 1 HD",
                url: "https://tv-trt1.medya.trt.com.tr/master.m3u8",
                logo: "https://upload.wikimedia.org/wikipedia/commons/thumb/c/ca/TRT_1_logo.svg/200px-TRT_1_logo.svg.png",
                category: "Ulusal"
            }
        ];

        let currentCategory = 'Spor';
        let currentPlayingChannelName = null;

        const channelListContainer = document.getElementById('channel-list');
        const currentChannelNameEl = document.getElementById('current-channel-name');
        const nowPlayingBadge = document.getElementById('now-playing-badge');
        const videoWrapper = document.getElementById('video-wrapper');
        
        // Player State
        let hlsPlayer = null;
        let dashPlayer = null;
        let plyrInstance = null;

        // Kategori Değiştirme Fonksiyonu
        function setCategory(categoryName) {
            currentCategory = categoryName;

            // Sekme tasarımlarını güncelle
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            if (categoryName === 'Spor') {
                document.querySelector('.tab-btn.spor').classList.add('active');
            } else if (categoryName === 'Ulusal') {
                document.querySelector('.tab-btn.ulusal').classList.add('active');
            }

            renderChannels();
        }

        // Seçili kategoriye göre kanalları ekrana basar
        function renderChannels() {
            channelListContainer.innerHTML = ''; 

            const filteredChannels = channels.filter(c => c.category === currentCategory);

            filteredChannels.forEach((channel) => {
                const button = document.createElement('button');
                button.className = 'channel-btn';
                
                // Eğer bu kanal şu an oynuyorsa, buton aktif gözüksün
                if (currentPlayingChannelName === channel.name) {
                    button.classList.add('active');
                }

                button.onclick = () => playChannel(channel, button);

                let mediaIconHtml = '';

                if (channel.logo && channel.logo.trim() !== '') {
                    mediaIconHtml = `<img src="${channel.logo}" alt="${channel.name}" class="channel-logo" onerror="this.style.display='none'">`;
                } else {
                    const shortName = channel.name.substring(0, 2).toUpperCase();
                    mediaIconHtml = `<div class="channel-icon">${shortName}</div>`;
                }

                button.innerHTML = `
                    ${mediaIconHtml}
                    <span>${channel.name}</span>
                `;

                channelListContainer.appendChild(button);
            });
        }

        function updateQuality(newQuality) {
            if (hlsPlayer) {
                if (newQuality === 0) {
                    hlsPlayer.currentLevel = -1; 
                } else {
                    hlsPlayer.levels.forEach((level, levelIndex) => {
                        if (level.height === newQuality) {
                            hlsPlayer.currentLevel = levelIndex;
                        }
                    });
                }
            }
        }

        function playChannel(channel, buttonElement) {
            // UI Güncellemeleri
            currentPlayingChannelName = channel.name;
            document.querySelectorAll('.channel-btn').forEach(btn => btn.classList.remove('active'));
            if(buttonElement) buttonElement.classList.add('active');

            currentChannelNameEl.innerText = channel.name;
            nowPlayingBadge.style.display = 'flex';

            if (hlsPlayer) { hlsPlayer.destroy(); hlsPlayer = null; }
            if (dashPlayer) { dashPlayer.reset(); dashPlayer = null; }
            if (plyrInstance) { plyrInstance.destroy(); plyrInstance = null; }

            videoWrapper.innerHTML = '<video id="tv-player" controls crossorigin playsinline></video>';
            const video = document.getElementById('tv-player');

            const url = channel.url.toLowerCase();

            const plyrOptions = {
                controls: ['play-large', 'play', 'live', 'mute', 'volume', 'settings', 'pip', 'airplay', 'fullscreen'],
                i18n: { qualityLabel: { 0: 'Otomatik' } }
            };

            if (url.includes('.m3u8')) {
                if (Hls.isSupported()) {
                    hlsPlayer = new Hls();
                    hlsPlayer.loadSource(channel.url);
                    hlsPlayer.attachMedia(video);
                    
                    hlsPlayer.on(Hls.Events.MANIFEST_PARSED, function (event, data) {
                        const availableQualities = hlsPlayer.levels.map((l) => l.height);
                        availableQualities.unshift(0); 
                        
                        plyrOptions.quality = {
                            default: 0,
                            options: availableQualities,
                            forced: true,
                            onChange: (e) => updateQuality(e)
                        };

                        plyrInstance = new Plyr(video, plyrOptions);
                        plyrInstance.play().catch(() => console.log("Otomatik oynatma engellendi."));
                    });
                } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                    video.src = channel.url;
                    plyrInstance = new Plyr(video, plyrOptions);
                    video.addEventListener('loadedmetadata', () => {
                        plyrInstance.play().catch(() => {});
                    });
                } else {
                    alert("Tarayıcınız HLS video formatını desteklemiyor.");
                }
            } 
            else if (url.includes('.mpd')) {
                if (typeof dashjs !== 'undefined') {
                    dashPlayer = dashjs.MediaPlayer().create();
                    dashPlayer.initialize(video, channel.url, true);
                    
                    plyrInstance = new Plyr(video, plyrOptions);
                } else {
                    alert("Tarayıcınız DASH oynatmayı desteklemiyor.");
                }
            } else {
                alert("Desteklenmeyen video formatı.");
            }
        }

        // Sayfa yüklendiğinde
        window.onload = () => {
            renderChannels();
            // İlk kanalı otomatik oynatmak için:
            const firstChannel = channels.find(c => c.category === 'Spor');
            if(firstChannel) {
                // DOM'da butonu bulup tetikleyelim
                setTimeout(() => {
                    const firstBtn = document.querySelector('.channel-btn');
                    if(firstBtn) playChannel(firstChannel, firstBtn);
                }, 100);
            }
        };
    </script>
</body>
</html>
