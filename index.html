<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FatihSports | Canlı TV</title>
    
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <script src="https://cdn.dashjs.org/latest/dash.all.min.js"></script>
    
    <link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css" />
    <script src="https://cdn.plyr.io/3.7.8/plyr.polyfilled.js"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary-color: #e50914; 
            --bg-color: #121212;
            --panel-bg: #1e1e1e;
            --text-color: #ffffff;
            --spor-color: #28a745;   
            --ulusal-color: #dc3545; 
            
            --plyr-color-main: #e50914; 
            --plyr-video-background: #000000;
        }

        /* AYDINLIK MOD DEĞİŞKENLERİ */
        body.light-mode {
            --bg-color: #f4f4f4;
            --panel-bg: #ffffff;
            --text-color: #121212; /* Bu renk Aydınlık modda Ay'ı siyah yapacak */
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        header {
            background-color: var(--panel-bg);
            padding: 15px 30px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.5);
            z-index: 10;
            transition: background-color 0.3s ease;
        }

        header h1 {
            font-size: 24px;
            font-weight: 700;
            color: var(--text-color);
            letter-spacing: 1px;
        }

        header h1 span {
            color: var(--primary-color);
        }

        /* TEMA BUTONU VE SVG İKON STİLLERİ */
        .theme-toggle-btn {
            background: none;
            border: none;
            cursor: pointer;
            transition: transform 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-color); /* İkon rengini temaya bağladık */
        }

        .theme-toggle-btn:hover {
            transform: scale(1.1);
        }

        .theme-toggle-btn svg {
            width: 26px;
            height: 26px;
            transition: all 0.3s ease;
        }

        /* Varsayılan (Karanlık Mod) - Güneşi Göster, Ayı Gizle */
        #icon-moon { display: none; }
        #icon-sun { display: block; }

        /* Aydınlık Mod - Ayı Göster, Güneşi Gizle */
        body.light-mode #icon-sun { display: none; }
        body.light-mode #icon-moon { display: block; }

        .main-container {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        .player-section {
            flex: 3;
            background-color: #000;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        #video-wrapper {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .plyr {
            width: 100%;
            height: 100%;
        }

        .now-playing {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.7);
            color: #ffffff;
            padding: 8px 15px;
            border-radius: 5px;
            font-size: 14px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 10px;
            pointer-events: none;
            z-index: 10;
        }

        .live-indicator {
            width: 10px;
            height: 10px;
            background-color: var(--primary-color);
            border-radius: 50%;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(229, 9, 20, 0.7); }
            70% { box-shadow: 0 0 0 10px rgba(229, 9, 20, 0); }
            100% { box-shadow: 0 0 0 0 rgba(229, 9, 20, 0); }
        }

        .sidebar {
            flex: 1;
            background-color: var(--panel-bg);
            min-width: 300px;
            max-width: 400px;
            display: flex;
            flex-direction: column;
            border-left: 1px solid rgba(128, 128, 128, 0.2);
            overflow: hidden;
            transition: background-color 0.3s ease;
        }

        .sidebar-header {
            padding: 20px 20px 10px 20px;
            font-weight: 600;
            font-size: 18px;
            flex-shrink: 0;
        }

        .category-tabs {
            display: flex;
            padding: 0 20px 15px 20px;
            gap: 10px;
            border-bottom: 1px solid rgba(128, 128, 128, 0.2);
            flex-shrink: 0;
        }

        .tab-btn {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            background-color: #333;
            color: #fff;
            font-weight: 600;
            font-size: 14px;
            transition: all 0.3s ease;
        }

        body.light-mode .tab-btn {
            background-color: #e0e0e0;
            color: #333;
        }

        .tab-btn:hover {
            opacity: 0.8;
        }

        .tab-btn.spor.active {
            background-color: var(--spor-color);
            color: #fff;
        }

        .tab-btn.ulusal.active {
            background-color: var(--ulusal-color);
            color: #fff;
        }

        .channel-list {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
            padding-bottom: 40px; 
            min-height: 0;
        }

        .channel-list::-webkit-scrollbar { width: 8px; }
        .channel-list::-webkit-scrollbar-thumb {
            background-color: #444;
            border-radius: 4px;
        }
        
        body.light-mode .channel-list::-webkit-scrollbar-thumb {
            background-color: #bbb;
        }

        .channel-btn {
            width: 100%;
            background-color: transparent;
            color: var(--text-color);
            border: none;
            padding: 15px;
            margin-bottom: 8px;
            text-align: left;
            font-size: 15px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .channel-btn:hover {
            background-color: #333;
            transform: translateX(5px);
        }

        .channel-btn.active {
            background-color: #444; 
            font-weight: 600;
        }

        body.light-mode .channel-btn:hover {
            background-color: #f0f0f0;
        }
        body.light-mode .channel-btn.active {
            background-color: #e5e5e5;
        }

        .channel-logo {
            width: 35px;
            height: 35px;
            object-fit: contain;
            border-radius: 4px;
            background-color: transparent;
        }

        .channel-icon {
            width: 35px;
            height: 35px;
            background-color: #555;
            border-radius: 5px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: bold;
            font-size: 12px;
            color: #fff;
        }

        @media (max-width: 900px) {
            .main-container { flex-direction: column; }
            .sidebar {
                max-width: 100%;
                flex: 1;
                border-left: none;
                border-top: 1px solid rgba(128, 128, 128, 0.2);
            }
            .player-section { flex: none; height: 40vh; }
        }
    </style>
</head>
<body>

    <header>
        <h1>Fatih<span>Sports</span></h1>
        
        <button id="theme-toggle" class="theme-toggle-btn" aria-label="Temayı Değiştir" title="Aydınlık/Karanlık Mod">
            <svg id="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="5"></circle>
                <line x1="12" y1="1" x2="12" y2="3"></line>
                <line x1="12" y1="21" x2="12" y2="23"></line>
                <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
                <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
                <line x1="1" y1="12" x2="3" y2="12"></line>
                <line x1="21" y1="12" x2="23" y2="12"></line>
                <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
                <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
            </svg>
            <svg id="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
            </svg>
        </button>
    </header>

    <div class="main-container">
        <div class="player-section">
            
            <div class="now-playing" id="now-playing-badge" style="display: none;">
                <div class="live-indicator"></div>
                <span id="current-channel-name">Kanal Seçilmedi</span>
            </div>

            <div id="video-wrapper"></div>
            
        </div>

        <div class="sidebar">
            <div class="sidebar-header">Kanal Listesi</div>
            
            <div class="category-tabs">
                <button class="tab-btn spor active" onclick="setCategory('Spor')">Spor</button>
                <button class="tab-btn ulusal" onclick="setCategory('Ulusal')">Ulusal</button>
            </div>

            <div class="channel-list" id="channel-list"></div>
        </div>
    </div>

    <script>
        // TEMA YÖNETİMİ (GÜNCELLENDİ)
        const themeToggleBtn = document.getElementById('theme-toggle');
        const currentTheme = localStorage.getItem('fatih_theme');

        // Sayfa yüklendiğinde hafızadaki temayı kontrol et
        if (currentTheme === 'light') {
            document.body.classList.add('light-mode');
        }

        themeToggleBtn.addEventListener('click', () => {
            document.body.classList.toggle('light-mode');
            
            // Seçilen temayı hafızaya kaydet
            if (document.body.classList.contains('light-mode')) {
                localStorage.setItem('fatih_theme', 'light');
            } else {
                localStorage.setItem('fatih_theme', 'dark');
            }
        });

        const channels = [
            {
                name: "FatihSports 1 HD",
                url: "https://noisy-cake-8ebc.travestigamzes.workers.dev/https://andro.0638527.xyz/checklist/androstreamlivebs1.m3u8",
                logo: "",
                category: "Spor"
            },
            {
                name: "FatihSports 1 HD (Yedek)",
                url: "https://noisy-cake-8ebc.travestigamzes.workers.dev/https://corestream.ronaldovurdu.help//hls/bein-sports-1.m3u8",
                logo: "",
                category: "Spor"
            },
            {
                name: "FatihSports 1 HD (Yedek 2)",
                url: "https://noisy-cake-8ebc.travestigamzes.workers.dev/http://andro.0638527.xyz/checklist/androstreamlivebs1.m3u8",
                logo: "",
                category: "Spor"
            },
            {
                name: "FatihSports 2 HD",
                url: "https://noisy-cake-8ebc.travestigamzes.workers.dev/https://corestream.ronaldovurdu.help//hls/bein-sports-2.m3u8",
                logo: "",
                category: "Spor"
            },
            {
                name: "FatihSports 3 HD",
                url: "https://noisy-cake-8ebc.travestigamzes.workers.dev/https://corestream.ronaldovurdu.help//hls/bein-sports-3.m3u8",
                logo: "",
                category: "Spor"
            },
            {
                name: "FatihSports 4 HD",
                url: "https://noisy-cake-8ebc.travestigamzes.workers.dev/https://corestream.ronaldovurdu.help//hls/bein-sports-4.m3u8",
                logo: "",
                category: "Spor"
            },
            {
                name: "Tabii Spor HD",
                url: "https://kl9mr2vxw7nq5py1sh4tj3gb6.medya.trt.com.tr/master_1080p.m3u8",
                logo: "",
                category: "Spor"
            },
            {
                name: "TRT 1 HD",
                url: "https://tv-trt1-dash.medya.trt.com.tr/master.mpd",
                logo: "https://upload.wikimedia.org/wikipedia/commons/thumb/c/ca/TRT_1_logo.svg/200px-TRT_1_logo.svg.png",
                category: "Ulusal"
            },
            {
                name: "TV8 HD",
                url: "https://noisy-cake-8ebc.travestigamzes.workers.dev/http://andro.0638527.xyz/checklist/androstreamlivetv8.m3u8",
                logo: "https://upload.wikimedia.org/wikipedia/commons/thumb/c/ca/TRT_1_logo.svg/200px-TRT_1_logo.svg.png",
                category: "Ulusal"
            },
            {
                name: "TRT SPOR HD",
                url: "https://tv-trtspor1.medya.trt.com.tr/master_1080.m3u8",
                logo: "https://upload.wikimedia.org/wikipedia/commons/thumb/c/ca/TRT_1_logo.svg/200px-TRT_1_logo.svg.png",
                category: "Ulusal"
            }
        ];

        let currentCategory = 'Spor';
        let currentPlayingChannelName = null;

        const channelListContainer = document.getElementById('channel-list');
        const currentChannelNameEl = document.getElementById('current-channel-name');
        const nowPlayingBadge = document.getElementById('now-playing-badge');
        const videoWrapper = document.getElementById('video-wrapper');
        
        let hlsPlayer = null;
        let dashPlayer = null;
        let plyrInstance = null;

        function setCategory(categoryName) {
            currentCategory = categoryName;

            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            if (categoryName === 'Spor') {
                document.querySelector('.tab-btn.spor').classList.add('active');
            } else if (categoryName === 'Ulusal') {
                document.querySelector('.tab-btn.ulusal').classList.add('active');
            }

            renderChannels();
        }

        function renderChannels() {
            channelListContainer.innerHTML = ''; 

            const filteredChannels = channels.filter(c => c.category === currentCategory);

            filteredChannels.forEach((channel) => {
                const button = document.createElement('button');
                button.className = 'channel-btn';
                
                if (currentPlayingChannelName === channel.name) {
                    button.classList.add('active');
                }

                button.onclick = () => playChannel(channel, button);

                let mediaIconHtml = '';

                if (channel.logo && channel.logo.trim() !== '') {
                    mediaIconHtml = `<img src="${channel.logo}" alt="${channel.name}" class="channel-logo" onerror="this.style.display='none'">`;
                } else {
                    const shortName = channel.name.substring(0, 2).toUpperCase();
                    mediaIconHtml = `<div class="channel-icon">${shortName}</div>`;
                }

                button.innerHTML = `
                    ${mediaIconHtml}
                    <span>${channel.name}</span>
                `;

                channelListContainer.appendChild(button);
            });
        }

        function updateQuality(newQuality) {
            if (hlsPlayer) {
                if (newQuality === 0) {
                    hlsPlayer.currentLevel = -1; 
                } else {
                    hlsPlayer.levels.forEach((level, levelIndex) => {
                        if (level.height === newQuality) {
                            hlsPlayer.currentLevel = levelIndex;
                        }
                    });
                }
            }
        }

        function playChannel(channel, buttonElement) {
            currentPlayingChannelName = channel.name;
            document.querySelectorAll('.channel-btn').forEach(btn => btn.classList.remove('active'));
            if(buttonElement) buttonElement.classList.add('active');

            currentChannelNameEl.innerText = channel.name;
            nowPlayingBadge.style.display = 'flex';

            if (hlsPlayer) { hlsPlayer.destroy(); hlsPlayer = null; }
            if (dashPlayer) { dashPlayer.reset(); dashPlayer = null; }
            if (plyrInstance) { plyrInstance.destroy(); plyrInstance = null; }

            videoWrapper.innerHTML = '<video id="tv-player" controls crossorigin playsinline></video>';
            const video = document.getElementById('tv-player');

            const url = channel.url.toLowerCase();

            const plyrOptions = {
                controls: ['play-large', 'play', 'live', 'mute', 'volume', 'settings', 'pip', 'airplay', 'fullscreen'],
                i18n: { qualityLabel: { 0: 'Otomatik' } }
            };

            if (url.includes('.m3u8')) {
                if (Hls.isSupported()) {
                    hlsPlayer = new Hls();
                    hlsPlayer.loadSource(channel.url);
                    hlsPlayer.attachMedia(video);
                    
                    hlsPlayer.on(Hls.Events.MANIFEST_PARSED, function (event, data) {
                        const availableQualities = hlsPlayer.levels.map((l) => l.height);
                        availableQualities.unshift(0); 
                        
                        plyrOptions.quality = {
                            default: 0,
                            options: availableQualities,
                            forced: true,
                            onChange: (e) => updateQuality(e)
                        };

                        plyrInstance = new Plyr(video, plyrOptions);
                        plyrInstance.play().catch(() => console.log("Otomatik oynatma engellendi."));
                    });
                } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                    video.src = channel.url;
                    plyrInstance = new Plyr(video, plyrOptions);
                    video.addEventListener('loadedmetadata', () => {
                        plyrInstance.play().catch(() => {});
                    });
                } else {
                    alert("Tarayıcınız HLS video formatını desteklemiyor.");
                }
            } 
            else if (url.includes('.mpd')) {
                if (typeof dashjs !== 'undefined') {
                    dashPlayer = dashjs.MediaPlayer().create();
                    dashPlayer.initialize(video, channel.url, true);
                    
                    plyrInstance = new Plyr(video, plyrOptions);
                } else {
                    alert("Tarayıcınız DASH oynatmayı desteklemiyor.");
                }
            } else {
                alert("Desteklenmeyen video formatı.");
            }
        }

        window.onload = () => {
            renderChannels();
            const firstChannel = channels.find(c => c.category === 'Spor');
            if(firstChannel) {
                setTimeout(() => {
                    const firstBtn = document.querySelector('.channel-btn');
                    if(firstBtn) playChannel(firstChannel, firstBtn);
                }, 100);
            }
        };
    </script>
</body>
</html>
