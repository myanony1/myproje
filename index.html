:root {

body{

}

}
.logo{display:flex;align-items:center;gap:8px;font-size:20px;}
.logo-icon{background-color:var(--primary);color:white;width:34px;height:34px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-weight:700;}

.header-actions{display:flex;align-items:center;gap:10px;}

  transition:border-color 0.15s,color 0.15s;
}
.theme-btn:hover{border-color:var(--primary);color:var(--primary);}

.container{display:flex;flex:1;width:100%;overflow:hidden;}

.left-content{

.player-wrapper{

  box-shadow:0 10px 30px rgba(0,0,0,0.4);width:100%;flex-shrink:0;
  transition:border-color 0.15s ease;
}

#player,#ios-player-container,#embed-container{width:100%;height:100%;position:absolute;top:0;left:0;display:none;}

.placeholder{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;color:white;background:#0a0a0a;z-index:20;}

.banner-section{text-align:center;flex-shrink:0;}

.right-content{
  width:420px;background-color:var(--bg-color);border-left:1px solid var(--border-color);

}

.tab-btn{flex:1;padding:15px 5px;border:none;background:transparent;color:var(--text-muted);font-weight:700;cursor:pointer;border-bottom:3px solid transparent;font-size:13px;text-transform:uppercase;transition:color 0.15s,border-color 0.15s;}

.list-header{background-color:var(--surface-color);padding:16px;flex-shrink:0;}
.search-box{width:100%;padding:12px 16px;border-radius:12px;border:1px solid var(--border-color);background-color:var(--bg-color);color:var(--text-main);outline:none;}

.channel-list{

  document.getElementById('btn-channels').classList.toggle('active', t==='channels');
  document.getElementById('btn-matches').classList.toggle('active', t==='matches');
  renderCurrentList();
}
function renderCurrentList() {
  const list   = currentTab==='channels' ? channels : matches;
  const search = document.getElementById('searchInput').value.toLowerCase();
  document.getElementById('channelList').innerHTML = list
    .filter(c => c.name.toLowerCase().includes(search))
    .map(c => `<div class="channel-card ${activeId===c.id?'active':''}" onclick="play('${c.id}')">
      ${currentTab==='channels'?`<div class="cc-logo"><img src="${c.logo}" onerror="this.src='https://via.placeholder.com/42'"></div>`:''}
      <div><div style="font-weight:700;font-size:14px">${c.name}</div>
      <div style="font-size:11px;color:var(--text-muted)">${c.cat} â€¢ ${c.qual}</div></div></div>`).join('');
}
function play(id) {
  activeId=id;
  const item=[...channels,...matches].find(c=>c.id===id);
  renderCurrentList();
  document.getElementById('placeholder').style.display='none';
  document.getElementById('player').style.display='none';
  document.getElementById('ios-player-container').style.display='none';
  document.getElementById('embed-container').style.display='none';
  if (clapprPlayer) clapprPlayer.destroy();
  document.getElementById('player').innerHTML='';
  document.getElementById('embed-iframe').src='';
  const iv=document.getElementById('ios-video');
  iv.pause(); iv.src=''; iv.load();
  const isHLS=item.url.includes('.m3u8')||item.url.includes('checklist')||item.url.includes('proxy')||item.url.includes('m3u');
  if (!isHLS) {
    document.getElementById('embed-container').style.display='block';
    document.getElementById('embed-iframe').src=item.url;
  } else if (isIOS) {
    document.getElementById('ios-player-container').style.display='block';
    iv.src=item.url; iv.load(); iv.muted=true;
    iv.play().catch(e=>console.log('Oynatma hatasÄ±:',e));
  } else {
    document.getElementById('player').style.display='block';
    clapprPlayer=new Clappr.Player({source:item.url,mimeType:'application/x-mpegURL',
      parentId:'#player',width:'100%',height:'100%',autoPlay:true,
      plugins:[HlsjsPlayback,LevelSelector],hlsjsConfig:{enableWorker:true}});
  }
}
function toggleTheme() {
  const d=document.documentElement, isDark=d.getAttribute('data-theme')==='dark';
  d.setAttribute('data-theme',isDark?'light':'dark');
  document.getElementById('themeBtn').innerHTML=isDark
    ?'<svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"></path></svg>'
    :'<svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="5"></circle><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"></path></svg>';
}
function openInfoModal()  { document.getElementById('infoModal').style.display='flex'; }
function closeInfoModal() { document.getElementById('infoModal').style.display='none'; }
function toggleFullScreen(elem) {
  if (!document.fullscreenElement&&!document.webkitFullscreenElement) {
    if (elem.requestFullscreen) elem.requestFullscreen();
    else if (elem.webkitRequestFullscreen) elem.webkitRequestFullscreen();
  } else {
    if (document.exitFullscreen) document.exitFullscreen();
    else if (document.webkitExitFullscreen) document.webkitExitFullscreen();
  }
}
let tvVolume=1.0, tvMuted=false;
function getActiveVideoEl() {
  if (clapprPlayer){const v=document.querySelector('#player video');if(v)return v;}
  const iv=document.getElementById('ios-video');
  if (iv&&iv.style.display!=='none') return iv;
  return null;
}
function updateVolUI() {
  const pct=tvMuted?0:Math.round(tvVolume*100);
  document.getElementById('tv-vol-bar').style.width=pct+'%';
  document.getElementById('tv-vol-label').textContent=pct;
  document.getElementById('tv-vol-icon').innerHTML=(tvMuted||tvVolume===0)
    ?'<polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><line x1="23" y1="9" x2="17" y2="15"/><line x1="17" y1="9" x2="23" y2="15"/>'
    :'<polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"/>';
}
function applyVolToVideo(){const v=getActiveVideoEl();if(v){v.volume=tvVolume;v.muted=tvMuted;}}
document.getElementById('tv-btn-fullscreen').addEventListener('click',e=>{e.stopPropagation();toggleFullScreen(document.getElementById('playerWrapper'));});
document.getElementById('tv-btn-mute').addEventListener('click',e=>{e.stopPropagation();tvMuted=!tvMuted;applyVolToVideo();updateVolUI();});
document.getElementById('tv-btn-vol-down').addEventListener('click',e=>{e.stopPropagation();tvVolume=Math.max(0,tvVolume-0.1);tvMuted=false;applyVolToVideo();updateVolUI();});
document.getElementById('tv-btn-vol-up').addEventListener('click',e=>{e.stopPropagation();tvVolume=Math.min(1,tvVolume+0.1);tvMuted=false;applyVolToVideo();updateVolUI();});

/* =====================================================================
   APK
===================================================================== */
let apkActiveCat='TÃ¼mÃ¼', apkHlsInst=null, apkActiveId=null;
let apkCtrlTimer=null, apkIsEmbed=false;

function filterApkChannels(cat) {
  apkActiveCat=cat;
  document.querySelectorAll('.apk-cat-btn').forEach(b=>b.classList.toggle('active',b.textContent.trim()===cat));
  renderApkGrid();
}
function renderApkGrid() {
  const filtered=channels.filter(c=>apkActiveCat==='TÃ¼mÃ¼'||c.cat===apkActiveCat);
  document.getElementById('apk-channel-grid').innerHTML=filtered.map(c=>`
    <div class="apk-channel-card ${apkActiveId===c.id?'active':''}"
         onclick="playApk('${c.id}')" data-id="${c.id}" tabindex="0">
      <div class="apk-card-logo">
        <img src="${c.logo}" onerror="this.src='https://via.placeholder.com/52?text=${encodeURIComponent((c.name[0]||'?'))}'">
      </div>
      <div><div class="apk-card-name">${c.name}</div><div class="apk-card-cat">${c.qual}</div></div>
    </div>`).join('');
  if (isTV) updateTVFocusableElements();
}

function playApk(id) {
  apkActiveId=id;
  const item=channels.find(c=>c.id===id);
  if (!item) return;
  renderApkGrid();
  /* Ã¶ncekini temizle */
  if (apkHlsInst){try{apkHlsInst.destroy();}catch(e){}apkHlsInst=null;}
  const vid=document.getElementById('apk-video');
  vid.pause(); vid.src=''; vid.load();
  document.getElementById('apk-embed-container').style.display='none';
  document.getElementById('apk-embed-iframe').src='';
  apkIsEmbed=false;
  /* overlay aÃ§ */
  document.getElementById('apk-player-overlay').classList.add('active');
  document.getElementById('apk-ctrl-channel-name').textContent=item.name;
  setApkPlayIcon(true);
  /* oynat */
  const isHLS=item.url.includes('.m3u8')||item.url.includes('checklist')||item.url.includes('proxy')||item.url.includes('m3u');
  if (!isHLS) {
    apkIsEmbed=true;
    document.getElementById('apk-embed-container').style.display='block';
    document.getElementById('apk-embed-iframe').src=item.url;
  } else if (isIOS) {
    vid.src=item.url; vid.load(); vid.muted=false;
    vid.play().catch(()=>{vid.muted=true;vid.play().catch(()=>{});});
  } else {
    if (typeof Hls!=='undefined'&&Hls.isSupported()) {
      apkHlsInst=new Hls({enableWorker:false,startLevel:-1});
      apkHlsInst.loadSource(item.url);
      apkHlsInst.attachMedia(vid);
      apkHlsInst.on(Hls.Events.MANIFEST_PARSED,()=>{
        vid.muted=false;
        vid.play().catch(()=>{vid.muted=true;vid.play().catch(()=>{});});
      });
    } else {
      vid.src=item.url; vid.load(); vid.muted=false;
      vid.play().catch(()=>{vid.muted=true;vid.play().catch(()=>{});});
    }
  }
  apkShowControls();
  /* TV: player kontrol moduna geÃ§ */
  if (isTV) { tvApkMode='player'; updateTVFocusableElements(); }
}

function closeApkPlayer() {
  if (apkHlsInst){try{apkHlsInst.destroy();}catch(e){}apkHlsInst=null;}
  const vid=document.getElementById('apk-video');
  vid.pause(); vid.src=''; vid.load();
  document.getElementById('apk-embed-iframe').src='';
  document.getElementById('apk-embed-container').style.display='none';
  document.getElementById('apk-player-overlay').classList.remove('active');
  apkHideControls();
  apkIsEmbed=false;
  try{if(document.fullscreenElement)document.exitFullscreen();else if(document.webkitFullscreenElement)document.webkitExitFullscreen();}catch(e){}
  if (isTV){tvApkMode='grid';APK_PLAYER_BTNS.forEach(id=>document.getElementById(id).classList.remove('tv-apk-focus'));updateTVFocusableElements();}
}

/* Kontroller */
function apkShowControls(){
  clearTimeout(apkCtrlTimer);
  document.getElementById('apk-controls').classList.add('visible');
  if (!apkIsEmbed) apkCtrlTimer=setTimeout(apkHideControls,3000);
}
function apkHideControls(){
  clearTimeout(apkCtrlTimer);
  document.getElementById('apk-controls').classList.remove('visible');
}

/* Ekrana dokunulunca */
document.getElementById('apk-player-overlay').addEventListener('click',function(e){
  if (e.target===this||e.target===document.getElementById('apk-video')){
    document.getElementById('apk-controls').classList.contains('visible')?apkHideControls():apkShowControls();
  }
});

/* Oynat/durdur */
function setApkPlayIcon(playing){
  document.getElementById('apk-play-icon').innerHTML=playing
    ?'<rect x="6" y="4" width="4" height="16" rx="1"/><rect x="14" y="4" width="4" height="16" rx="1"/>'
    :'<polygon points="5 3 19 12 5 21 5 3"/>';
}
function apkTogglePlay(){
  if (apkIsEmbed) return;
  const vid=document.getElementById('apk-video');
  if (vid.paused){vid.play();setApkPlayIcon(true);}
  else{vid.pause();setApkPlayIcon(false);}
  apkShowControls();
}

/* Ses */
function apkToggleMute(){
  if (apkIsEmbed) return;
  const vid=document.getElementById('apk-video');
  vid.muted=!vid.muted;
  document.getElementById('apk-vol-slider').value=vid.muted?0:Math.round(vid.volume*100);
  updateApkMuteIcon(vid.muted);
  apkShowControls();
}
function apkSetVolume(val){
  if (apkIsEmbed) return;
  const vid=document.getElementById('apk-video');
  vid.volume=val/100; vid.muted=(val==0);
  updateApkMuteIcon(vid.muted);
  apkShowControls();
}
function updateApkMuteIcon(muted){
  document.getElementById('apk-mute-icon').innerHTML=muted
    ?'<polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><line x1="23" y1="9" x2="17" y2="15"/><line x1="17" y1="9" x2="23" y2="15"/>'
    :'<polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"/>';
}

/* =====================================================================
   TV KUMANDA NAVÄ°GASYON
===================================================================== */
let tvFocusableElements=[], tvFocusedIndex=-1, tvMode='ana';
const TV_CTRL_BTNS=['tv-btn-fullscreen','tv-btn-mute','tv-btn-vol-down','tv-btn-vol-up'];
let tvCtrlFocusedIndex=0;

/* APK TV */
const APK_PLAYER_BTNS=['apk-btn-back','apk-btn-playpause','apk-btn-mute','apk-btn-fs'];
let tvApkPlayerBtnIdx=0, tvApkMode='grid';

function updateTVFocusableElements(){
  if (isAPK){
    tvFocusableElements = tvApkMode==='grid'
      ? Array.from(document.querySelectorAll('.apk-cat-btn,.apk-channel-card')).filter(el=>el.offsetWidth>0)
      : APK_PLAYER_BTNS.map(id=>document.getElementById(id)).filter(Boolean);
  } else {
    tvFocusableElements=Array.from(document.querySelectorAll(
      '.theme-btn,.player-wrapper,.tab-btn,#searchInput,.channel-card,.social-btn,.modal-content button'
    )).filter(el=>el.offsetWidth>0&&window.getComputedStyle(el).display!=='none');
  }
}
function setCtrlBtnFocus(i){TV_CTRL_BTNS.forEach((id,j)=>document.getElementById(id).classList.toggle('tv-ctrl-focused',j===i));}
function enterPlayerMode(){tvMode='player';tvCtrlFocusedIndex=0;document.getElementById('tv-player-controls').classList.add('tv-focus-active');setCtrlBtnFocus(0);}
function exitPlayerMode(){tvMode='ana';document.getElementById('tv-player-controls').classList.remove('tv-focus-active');TV_CTRL_BTNS.forEach(id=>document.getElementById(id).classList.remove('tv-ctrl-focused'));}

function enterApkPlayerTV(){
  tvApkMode='player';
  apkShowControls();
  tvApkPlayerBtnIdx=0;
  updateTVFocusableElements();
  APK_PLAYER_BTNS.forEach((id,i)=>document.getElementById(id).classList.toggle('tv-apk-focus',i===0));
}
function exitApkPlayerTV(){
  tvApkMode='grid';
  APK_PLAYER_BTNS.forEach(id=>document.getElementById(id).classList.remove('tv-apk-focus'));
  apkHideControls();
  updateTVFocusableElements();
}

document.addEventListener('keydown',function(e){
  const KEYS=['ArrowUp','ArrowDown','ArrowLeft','ArrowRight','Enter',
              'Backspace','Escape','GoBack','Back','XF86Back'];
  if (!KEYS.includes(e.key)) return;
  if (document.activeElement.tagName==='INPUT'&&(e.key==='ArrowLeft'||e.key==='ArrowRight')) return;
  e.preventDefault();

  const isBack=e.key==='Backspace'||e.key==='Escape'||e.key==='GoBack'||e.key==='Back'||e.key==='XF86Back';

  /* ---- APK ---- */
  if (isAPK){
    const overlayActive=document.getElementById('apk-player-overlay').classList.contains('active');

    if (overlayActive){
      if (isBack){
        if (tvApkMode==='player'){exitApkPlayerTV();}
        else{closeApkPlayer();}
        return;
      }
      /* Herhangi ok/enter â†’ kontrolleri gÃ¶ster ve kontrol moduna gir */
      apkShowControls();
      if (tvApkMode==='grid'){enterApkPlayerTV();return;}
      /* tvApkMode==='player' â†’ butonlar arasÄ± gezin */
      if (e.key==='ArrowLeft') tvApkPlayerBtnIdx=Math.max(0,tvApkPlayerBtnIdx-1);
      else if (e.key==='ArrowRight') tvApkPlayerBtnIdx=Math.min(APK_PLAYER_BTNS.length-1,tvApkPlayerBtnIdx+1);
      else if (e.key==='ArrowDown'){exitApkPlayerTV();return;}
      else if (e.key==='Enter'){document.getElementById(APK_PLAYER_BTNS[tvApkPlayerBtnIdx]).click();return;}
      APK_PLAYER_BTNS.forEach((id,i)=>document.getElementById(id).classList.toggle('tv-apk-focus',i===tvApkPlayerBtnIdx));
      return;
    }

    /* Izgara modu */
    if (isBack) return;
    updateTVFocusableElements();
    if (!tvFocusableElements.length) return;

    if (e.key==='Enter'){
      if (tvFocusedIndex>=0&&tvFocusableElements[tvFocusedIndex]) tvFocusableElements[tvFocusedIndex].click();
      return;
    }
    if (tvFocusedIndex>=0&&tvFocusableElements[tvFocusedIndex]) tvFocusableElements[tvFocusedIndex].classList.remove('tv-focus');

    const cols=2, total=tvFocusableElements.length;
    if (e.key==='ArrowRight') tvFocusedIndex=Math.min(tvFocusedIndex+1,total-1);
    else if (e.key==='ArrowLeft') tvFocusedIndex=Math.max(tvFocusedIndex-1,0);
    else if (e.key==='ArrowDown'){
      const cur=tvFocusableElements[tvFocusedIndex];
      if (cur&&cur.classList.contains('apk-cat-btn')){
        const fc=tvFocusableElements.findIndex(el=>el.classList.contains('apk-channel-card'));
        if (fc!==-1) tvFocusedIndex=fc;
      } else tvFocusedIndex=Math.min(tvFocusedIndex+cols,total-1);
    }
    else if (e.key==='ArrowUp'){
      const cur=tvFocusableElements[tvFocusedIndex];
      if (cur&&cur.classList.contains('apk-channel-card')){
        const ni=tvFocusedIndex-cols;
        if (ni<0){const fc=tvFocusableElements.findIndex(el=>el.classList.contains('apk-cat-btn'));tvFocusedIndex=fc>=0?fc:0;}
        else tvFocusedIndex=ni;
      } else tvFocusedIndex=Math.max(tvFocusedIndex-1,0);
    }
    const t=tvFocusableElements[tvFocusedIndex];
    if (t){t.classList.add('tv-focus');t.scrollIntoView({behavior:'smooth',block:'nearest'});}
    return;
  }

  /* ---- SÄ°TE TV ---- */
  if (tvMode==='player'){
    if (isBack){exitPlayerMode();return;}
    if (e.key==='ArrowRight'){tvCtrlFocusedIndex=Math.min(tvCtrlFocusedIndex+1,TV_CTRL_BTNS.length-1);setCtrlBtnFocus(tvCtrlFocusedIndex);return;}
    if (e.key==='ArrowLeft'){tvCtrlFocusedIndex=Math.max(tvCtrlFocusedIndex-1,0);setCtrlBtnFocus(tvCtrlFocusedIndex);return;}
    if (e.key==='ArrowDown'){exitPlayerMode();return;}
    if (e.key==='Enter'){document.getElementById(TV_CTRL_BTNS[tvCtrlFocusedIndex]).click();return;}
    return;
  }
  updateTVFocusableElements();
  if (!tvFocusableElements.length) return;
  if (e.key==='Enter'){
    if (tvFocusedIndex>=0&&tvFocusableElements[tvFocusedIndex]){
      const el=tvFocusableElements[tvFocusedIndex];
      if (el.classList.contains('player-wrapper')) enterPlayerMode();
      else{el.click();if(el.id==='searchInput')el.focus();}
    }
    return;
  }
  if (tvFocusedIndex>=0&&tvFocusableElements[tvFocusedIndex]){
    tvFocusableElements[tvFocusedIndex].classList.remove('tv-focus');
    if (tvFocusableElements[tvFocusedIndex].classList.contains('player-wrapper')) exitPlayerMode();
  }
  if (e.key==='ArrowDown'||e.key==='ArrowRight') tvFocusedIndex=Math.min(tvFocusedIndex+1,tvFocusableElements.length-1);
  else if (e.key==='ArrowUp'||e.key==='ArrowLeft') tvFocusedIndex=Math.max(tvFocusedIndex-1,0);
  const t=tvFocusableElements[tvFocusedIndex];
  if (t){t.classList.add('tv-focus');t.scrollIntoView({behavior:'smooth',block:'nearest'});}
});

/* MutationObserver */
const tvObserver=new MutationObserver(()=>{
  updateTVFocusableElements();
  if (tvFocusedIndex>=tvFocusableElements.length) tvFocusedIndex=tvFocusableElements.length-1;
});

/* =====================================================================
   BAÅžLANGIÃ‡
===================================================================== */
window.onload=function(){
  if (isAPK){
    filterApkChannels('TÃ¼mÃ¼');
    tvObserver.observe(document.getElementById('apk-channel-grid'),{childList:true});
  } else {
    renderCurrentList();
    tvObserver.observe(document.getElementById('channelList'),{childList:true});
  }
};
</script>
