<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FatihSports | Canlı TV</title>
    
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <script src="https://cdn.dashjs.org/latest/dash.all.min.js"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary-color: #e50914; 
            --bg-color: #121212;
            --panel-bg: #1e1e1e;
            --text-color: #ffffff;
            --text-muted: #aaaaaa;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        /* Üst Menü / Header */
        header {
            background-color: var(--panel-bg);
            padding: 15px 30px;
            display: flex;
            align-items: center;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.5);
            z-index: 10;
        }

        header h1 {
            font-size: 24px;
            font-weight: 700;
            color: var(--text-color);
            letter-spacing: 1px;
        }

        header h1 span {
            color: var(--primary-color);
        }

        /* Ana İçerik Alanı */
        .main-container {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        /* Video Oynatıcı Alanı */
        .player-section {
            flex: 3;
            background-color: #000;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: contain;
            outline: none;
        }

        /* Sol Üst - Şu An Oynatılan Bilgisi */
        .now-playing {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.7);
            padding: 8px 15px;
            border-radius: 5px;
            font-size: 14px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 10px;
            pointer-events: none;
            z-index: 2;
        }

        .live-indicator {
            width: 10px;
            height: 10px;
            background-color: var(--primary-color);
            border-radius: 50%;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(229, 9, 20, 0.7); }
            70% { box-shadow: 0 0 0 10px rgba(229, 9, 20, 0); }
            100% { box-shadow: 0 0 0 0 rgba(229, 9, 20, 0); }
        }

        /* Sağ Üst - Araç Çubuğu (Kalite ve Tam Ekran) */
        .toolbar {
            position: absolute;
            top: 20px;
            right: 20px;
            display: flex;
            gap: 10px;
            z-index: 2;
        }

        .toolbar select, .toolbar button {
            background: rgba(0, 0, 0, 0.7);
            color: white;
            border: 1px solid #444;
            padding: 8px 12px;
            border-radius: 5px;
            font-size: 14px;
            cursor: pointer;
            outline: none;
            transition: all 0.3s;
        }

        .toolbar select:hover, .toolbar button:hover {
            background: rgba(229, 9, 20, 0.8);
            border-color: var(--primary-color);
        }

        /* Kanal Listesi Alanı */
        .sidebar {
            flex: 1;
            background-color: var(--panel-bg);
            min-width: 300px;
            max-width: 400px;
            display: flex;
            flex-direction: column;
            border-left: 1px solid #333;
        }

        .sidebar-header {
            padding: 20px;
            border-bottom: 1px solid #333;
            font-weight: 600;
            font-size: 18px;
        }

        .channel-list {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
        }

        .channel-list::-webkit-scrollbar {
            width: 8px;
        }
        .channel-list::-webkit-scrollbar-thumb {
            background-color: #444;
            border-radius: 4px;
        }

        .channel-btn {
            width: 100%;
            background-color: transparent;
            color: var(--text-color);
            border: none;
            padding: 15px;
            margin-bottom: 8px;
            text-align: left;
            font-size: 15px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .channel-btn:hover {
            background-color: #333;
            transform: translateX(5px);
        }

        .channel-btn.active {
            background-color: var(--primary-color);
            font-weight: 600;
        }

        .channel-logo {
            width: 35px;
            height: 35px;
            object-fit: contain;
            border-radius: 4px;
            background-color: transparent;
        }

        .channel-icon {
            width: 35px;
            height: 35px;
            background-color: #444;
            border-radius: 5px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: bold;
            font-size: 12px;
            color: #fff;
        }

        @media (max-width: 900px) {
            .main-container {
                flex-direction: column;
            }
            .sidebar {
                max-width: 100%;
                flex: 1;
                border-left: none;
                border-top: 1px solid #333;
            }
            .player-section {
                flex: none;
                height: 40vh;
            }
        }
    </style>
</head>
<body>

    <header>
        <h1>Fatih<span>Sports</span></h1>
    </header>

    <div class="main-container">
        <div class="player-section" id="player-container">
            
            <div class="now-playing" id="now-playing-badge" style="display: none;">
                <div class="live-indicator"></div>
                <span id="current-channel-name">Kanal Seçilmedi</span>
            </div>

            <div class="toolbar" id="toolbar" style="display: none;">
                <select id="quality-selector">
                    <option value="-1">Otomatik</option>
                </select>
                <button id="fullscreen-btn" onclick="toggleFullScreen()">Tam Ekran ⛶</button>
            </div>

            <video id="tv-player" controls autoplay></video>
        </div>

        <div class="sidebar">
            <div class="sidebar-header">
                Kanal Listesi
            </div>
            <div class="channel-list" id="channel-list"></div>
        </div>
    </div>

    <script>
        const channels = [
            {
                name: "FatihSports 1 (Canlı)",
                url: "https://0ch.d72577a9dd0ec41.sbs/patron/mono.m3u8",
                logo: "https://upload.wikimedia.org/wikipedia/commons/thumb/e/e3/Soccer_ball.svg/100px-Soccer_ball.svg.png" 
            },
            {
                name: "FatihSports1 (Yedek)",
                url: "https://noisy-cake-8ebc.travestigamzes.workers.dev/https://corestream.ronaldovurdu.help//hls/bein-sports-1.m3u8",
                logo: "https://upload.wikimedia.org/wikipedia/commons/thumb/7/7a/Basketball.png/100px-Basketball.png"
            },
            {
                name: "FatihSports 1 (Yedek 2)",
                url: "http://andro.0638527.xyz/checklist/androstreamlivebs1.m3u8"
            },
            {
                name: "Belgesel TV",
                url: "https://test-streams.mux.dev/x36xhzz/x36xhzz.m3u8",
                logo: ""
            }
        ];

        const video = document.getElementById('tv-player');
        const channelListContainer = document.getElementById('channel-list');
        const currentChannelNameEl = document.getElementById('current-channel-name');
        const nowPlayingBadge = document.getElementById('now-playing-badge');
        const toolbar = document.getElementById('toolbar');
        const qualitySelector = document.getElementById('quality-selector');
        const playerContainer = document.getElementById('player-container');
        const fullscreenBtn = document.getElementById('fullscreen-btn');
        
        // Player değişkenleri
        let hlsPlayer = null;
        let dashPlayer = null;

        // Tam Ekran Fonksiyonu
        function toggleFullScreen() {
            if (!document.fullscreenElement) {
                if (playerContainer.requestFullscreen) {
                    playerContainer.requestFullscreen();
                } else if (playerContainer.webkitRequestFullscreen) { /* Safari */
                    playerContainer.webkitRequestFullscreen();
                } else if (playerContainer.msRequestFullscreen) { /* IE11 */
                    playerContainer.msRequestFullscreen();
                }
                fullscreenBtn.innerText = "Küçült ✖";
            } else {
                if (document.exitFullscreen) {
                    document.exitFullscreen();
                } else if (document.webkitExitFullscreen) { /* Safari */
                    document.webkitExitFullscreen();
                } else if (document.msExitFullscreen) { /* IE11 */
                    document.msExitFullscreen();
                }
                fullscreenBtn.innerText = "Tam Ekran ⛶";
            }
        }

        // ESC tuşu ile tam ekrandan çıkışta butonu güncelle
        document.addEventListener('fullscreenchange', () => {
            if (!document.fullscreenElement) fullscreenBtn.innerText = "Tam Ekran ⛶";
        });

        // Kanalları Listeleme Fonksiyonu
        function renderChannels() {
            channelListContainer.innerHTML = ''; 

            channels.forEach((channel, index) => {
                const button = document.createElement('button');
                button.className = 'channel-btn';
                button.onclick = () => playChannel(channel, button);

                let mediaIconHtml = '';

                if (channel.logo && channel.logo.trim() !== '') {
                    mediaIconHtml = `<img src="${channel.logo}" alt="${channel.name}" class="channel-logo" onerror="this.style.display='none'">`;
                } else {
                    const shortName = channel.name.substring(0, 2).toUpperCase();
                    mediaIconHtml = `<div class="channel-icon">${shortName}</div>`;
                }

                button.innerHTML = `
                    ${mediaIconHtml}
                    <span>${channel.name}</span>
                `;

                channelListContainer.appendChild(button);

                if (index === 0) {
                    setTimeout(() => playChannel(channel, button), 100);
                }
            });
        }

        // Önceki oynatıcıları temizleme fonksiyonu
        function destroyPlayers() {
            if (hlsPlayer) {
                hlsPlayer.destroy();
                hlsPlayer = null;
            }
            if (dashPlayer) {
                dashPlayer.destroy();
                dashPlayer = null;
            }
            video.pause();
            video.removeAttribute('src');
            video.load();
            
            // Kalite seçiciyi sıfırla
            qualitySelector.innerHTML = '<option value="-1">Otomatik</option>';
            qualitySelector.style.display = 'none'; // Çözünürlükler yüklenene kadar gizle
        }

        // Kanal Oynatma Fonksiyonu
        function playChannel(channel, buttonElement) {
            document.querySelectorAll('.channel-btn').forEach(btn => btn.classList.remove('active'));
            if(buttonElement) buttonElement.classList.add('active');

            currentChannelNameEl.innerText = channel.name;
            nowPlayingBadge.style.display = 'flex';
            toolbar.style.display = 'flex';

            destroyPlayers();

            const url = channel.url.toLowerCase();

            // DASH (.mpd) Yayınları İçin
            if (url.includes('.mpd')) {
                if (typeof dashjs !== 'undefined') {
                    dashPlayer = dashjs.MediaPlayer().create();
                    dashPlayer.initialize(video, channel.url, true);
                    
                    // Kalite Seviyelerini Çek (DASH)
                    dashPlayer.on(dashjs.MediaPlayer.events.STREAM_INITIALIZED, function () {
                        const bitrates = dashPlayer.getBitrateInfoListFor("video");
                        if (bitrates.length > 1) {
                            qualitySelector.style.display = 'inline-block';
                            bitrates.forEach((bitrate, index) => {
                                const option = document.createElement('option');
                                option.value = index;
                                option.text = `${bitrate.height}p`;
                                qualitySelector.appendChild(option);
                            });
                        }
                    });

                    // DASH Kalite Değişimi
                    qualitySelector.onchange = (e) => {
                        const val = parseInt(e.target.value);
                        if (val === -1) {
                            dashPlayer.updateSettings({ streaming: { abr: { autoSwitchBitrate: { video: true } } } });
                        } else {
                            dashPlayer.updateSettings({ streaming: { abr: { autoSwitchBitrate: { video: false } } } });
                            dashPlayer.setQualityFor("video", val);
                        }
                    };

                } else {
                    alert("Tarayıcınız DASH oynatmayı desteklemiyor.");
                }
            } 
            // HLS (.m3u8) Yayınları İçin
            else if (url.includes('.m3u8')) {
                if (Hls.isSupported()) {
                    hlsPlayer = new Hls();
                    hlsPlayer.loadSource(channel.url);
                    hlsPlayer.attachMedia(video);
                    hlsPlayer.on(Hls.Events.MANIFEST_PARSED, function (event, data) {
                        video.play().catch(e => console.log("Otomatik oynatma engellendi."));
                        
                        // Kalite Seviyelerini Çek (HLS)
                        const levels = hlsPlayer.levels;
                        if (levels.length > 1) {
                            qualitySelector.style.display = 'inline-block';
                            levels.forEach((level, index) => {
                                const option = document.createElement('option');
                                option.value = index;
                                option.text = `${level.height}p`;
                                qualitySelector.appendChild(option);
                            });
                        }
                    });

                    // HLS Kalite Değişimi
                    qualitySelector.onchange = (e) => {
                        hlsPlayer.currentLevel = parseInt(e.target.value);
                    };

                } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                    // Safari gibi yerel HLS destekleyen tarayıcılar (Manuel kalite seçimi genelde Safari'de desteklenmez)
                    video.src = channel.url;
                    video.addEventListener('loadedmetadata', function () {
                        video.play();
                    });
                } else {
                    alert("Tarayıcınız HLS video formatını desteklemiyor.");
                }
            } else {
                alert("Desteklenmeyen video formatı. Lütfen m3u8 veya mpd kullanın.");
            }
        }

        window.onload = renderChannels;
    </script>
</body>
</html>
